# Verify the audit execution screen renders question cards from a question-note-capable
# instrument payload without crashing, and that auditors can navigate between questions.
#
# Note: No live instrument questions currently have a notes_prompt set at the question
# level, so this flow validates the execution shell rather than the note input UI.
# Helper-level note preservation is covered by tests/checklist-helpers.spec.ts (Vitest).
appId: com.pratyush.sudhakar.audittoolsplayspacemobile
---
- runFlow: create-audit.yaml
- extendedWaitUntil:
      visible: ".*Provision.*|.*This playspace.*|.*Question.*|.*of.*"
      timeout: 30000

- scrollUntilVisible:
      element:
          text: ".*Provision.*|.*This playspace.*|.*Question.*|.*of.*"
      direction: DOWN
      timeout: 10000

- extendedWaitUntil:
      visible: ".*Provision.*|.*This playspace.*|.*Question.*"
      timeout: 10000
