name: Mobile Quality

on:
    pull_request:
        branches: ["master"]
    push:
        branches: ["master"]

concurrency:
    group: mobile-quality-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    quality:
        name: Quality Gate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.13"

            - name: Setup Node
              uses: actions/setup-node@v7
              with:
                  node-version: "25"

            - name: Install dependencies
              run: bun install

            - name: Run quality checks
              run: bun run check

            - name: Run Expo doctor
              run: bun run doctor
