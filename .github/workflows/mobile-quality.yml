name: Mobile Quality

on:
    pull_request:
        branches: ["master"]
    push:
        branches: ["master"]

concurrency:
    group: mobile-quality-${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    quality:
        name: Quality Gate
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.9"

            - name: Setup Node
              uses: actions/setup-node@v6
              with:
                  node-version: "20"

            - name: Install dependencies
              run: bun install --frozen-lockfile

            - name: Run quality checks
              run: bun run check

            - name: Run Expo doctor
              run: bun run doctor

            - name: Build web bundle
              run: bun run build:web

            - name: Validate web bundle budget
              run: bun run perf:web:budget
