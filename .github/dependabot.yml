version: 2
updates:
    - package-ecosystem: "npm"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "08:00"
          timezone: "UTC"
      open-pull-requests-limit: 10
      commit-message:
          prefix: "deps"
      labels:
          - "dependencies"
          - "mobile"

    - package-ecosystem: "github-actions"
      directory: "/"
      schedule:
          interval: "weekly"
          day: "monday"
          time: "08:30"
          timezone: "UTC"
      open-pull-requests-limit: 5
      commit-message:
          prefix: "ci"
      labels:
          - "dependencies"
          - "ci"
