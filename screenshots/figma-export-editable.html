<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Audit Tools Playspace Editable Figma Export</title>
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --paper: #f6f0e8;
        --paper-dark: #161311;
        --grid-gap: 28px;
        --device-width: 430px;
        --device-height: 932px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Geist", sans-serif;
        background: var(--paper);
        color: #221c17;
      }

      body.mode-dark {
        background: var(--paper-dark);
        color: #efe7dc;
      }

      .page {
        max-width: 1680px;
        margin: 0 auto;
        padding: 32px 28px 80px;
      }

      .hero {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 28px;
      }

      .eyebrow {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #9a826f;
      }

      body.mode-dark .eyebrow {
        color: #b49e8e;
      }

      .hero h1 {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        font-size: 46px;
        line-height: 1;
      }

      .hero p {
        margin: 0;
        max-width: 760px;
        font-size: 18px;
        line-height: 1.45;
        color: #66594e;
      }

      body.mode-dark .hero p {
        color: #c3b6a9;
      }

      .screen-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--grid-gap);
        align-items: start;
      }

      .screen-card {
        display: flex;
        flex-direction: column;
        gap: 12px;
        align-items: center;
      }

      .screen-label {
        align-self: flex-start;
        font-family: "JetBrains Mono", monospace;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #9a826f;
      }

      body.mode-dark .screen-label {
        color: #b49e8e;
      }

      .phone {
        width: var(--device-width);
        min-height: var(--device-height);
        border-radius: 36px;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--fg);
        box-shadow: 0 28px 70px rgba(43, 33, 26, 0.16);
      }

      .phone.light {
        --bg: #faf6f0;
        --fg: #2c241e;
        --muted: #6e6258;
        --secondary: #4a403a;
        --surface: #f7f1ea;
        --surface-strong: #f3eee8;
        --input: #fffdfa;
        --border: #d7c8b8;
        --hairline: #e2d7cc;
        --accent: #b06a38;
        --accent-soft: rgba(176, 106, 56, 0.12);
        --success: #3d6b4f;
        --success-soft: rgba(61, 107, 79, 0.14);
        --warning: #9a7a3f;
        --warning-soft: rgba(154, 122, 63, 0.14);
        --danger: #b54a38;
        --danger-soft: rgba(181, 74, 56, 0.14);
        --violet: #6b5a8a;
        --shadow: 0 10px 24px rgba(60, 48, 42, 0.08);
        --home-indicator: #1f1a16;
        --island: #050505;
      }

      .phone.dark {
        --bg: #1c1917;
        --fg: #e7ded3;
        --muted: #afa497;
        --secondary: #d2c7bb;
        --surface: #24201d;
        --surface-strong: #2b2622;
        --input: #211d1a;
        --border: #3a3430;
        --hairline: #322d29;
        --accent: #c58a5c;
        --accent-soft: rgba(197, 138, 92, 0.12);
        --success: #6f9a7f;
        --success-soft: rgba(111, 154, 127, 0.14);
        --warning: #b99a5a;
        --warning-soft: rgba(185, 154, 90, 0.14);
        --danger: #c98472;
        --danger-soft: rgba(201, 132, 114, 0.14);
        --violet: #9b86b2;
        --shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
        --home-indicator: #e7ded3;
        --island: #010101;
      }

      .status-bar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 18px 6px;
        min-height: 56px;
        color: var(--fg);
        flex-shrink: 0;
      }

      .status-time {
        font-size: 14px;
        font-weight: 700;
      }

      .dynamic-island {
        width: 126px;
        height: 38px;
        border-radius: 999px;
        background: var(--island);
      }

      .status-cluster {
        display: flex;
        align-items: center;
        gap: 7px;
      }

      .signal {
        display: flex;
        align-items: flex-end;
        gap: 2px;
      }

      .signal span {
        display: block;
        width: 3px;
        border-radius: 999px;
        background: var(--fg);
      }

      .signal span:nth-child(1) {
        height: 5px;
        opacity: 0.45;
      }

      .signal span:nth-child(2) {
        height: 7px;
        opacity: 0.65;
      }

      .signal span:nth-child(3) {
        height: 9px;
        opacity: 0.85;
      }

      .signal span:nth-child(4) {
        height: 11px;
      }

      .wifi {
        width: 12px;
        height: 10px;
        border: 2px solid var(--fg);
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        border-bottom: 0;
        transform: translateY(1px);
      }

      .battery {
        width: 24px;
        height: 12px;
        border: 1.5px solid var(--fg);
        border-radius: 4px;
        padding: 1.5px;
        position: relative;
      }

      .battery::after {
        content: "";
        position: absolute;
        right: -3px;
        top: 3px;
        width: 2px;
        height: 4px;
        border-radius: 999px;
        background: var(--fg);
      }

      .battery-level {
        width: 72%;
        height: 100%;
        border-radius: 2px;
        background: var(--fg);
      }

      .app-bar {
        min-height: 52px;
        border-bottom: 1px solid var(--hairline);
        display: grid;
        grid-template-columns: 32px 1fr 32px;
        align-items: center;
        padding: 0 16px;
        flex-shrink: 0;
      }

      .app-bar.center-title .app-bar-title {
        text-align: center;
      }

      .app-bar-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--fg);
      }

      .back-glyph,
      .trailing-glyph {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 24px;
        height: 24px;
        color: var(--accent);
        font-size: 20px;
        line-height: 1;
      }

      .phone-body {
        display: flex;
        flex: 1;
        flex-direction: column;
        gap: 16px;
        padding: 14px 16px 0;
      }

      .phone-body.auth {
        padding-top: 32px;
      }

      .auth-center {
        display: flex;
        flex: 1;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 18px;
      }

      .brand-mark {
        width: 88px;
        height: 88px;
        border-radius: 22px;
        border: 1px solid var(--border);
        background: var(--surface-strong);
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: var(--shadow);
        font-family: "Space Grotesk", sans-serif;
        font-size: 24px;
        font-weight: 700;
        color: var(--accent);
      }

      .title-block {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .title-block h2 {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        font-size: 34px;
        line-height: 1.05;
        letter-spacing: -0.04em;
      }

      .title-block.center h2,
      .title-block.center p,
      .title-block.center .kicker {
        text-align: center;
      }

      .title-block p {
        margin: 0;
        font-size: 17px;
        line-height: 1.35;
        color: var(--muted);
      }

      .kicker {
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .card {
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--surface);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 10px;
        box-shadow: var(--shadow);
      }

      .card.flat {
        box-shadow: none;
      }

      .card-title {
        font-size: 18px;
        line-height: 1.2;
        font-weight: 700;
      }

      .card-text {
        font-size: 16px;
        line-height: 1.4;
        color: var(--muted);
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      .metric-grid.three {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .metric-card {
        border: 1px solid var(--border);
        border-radius: 20px;
        background: var(--surface);
        padding: 14px;
        min-height: 104px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        box-shadow: var(--shadow);
      }

      .metric-label {
        font-family: "JetBrains Mono", monospace;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--muted);
      }

      .metric-value {
        font-family: "Space Grotesk", sans-serif;
        font-size: 28px;
        line-height: 1;
        font-weight: 700;
        color: var(--accent);
      }

      .metric-value.success {
        color: var(--success);
      }

      .metric-value.subtle {
        color: var(--fg);
      }

      .metric-note {
        font-size: 14px;
        line-height: 1.35;
        color: var(--muted);
      }

      .row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .field-row {
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 60px;
        padding: 0 16px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--input);
      }

      .field-icon,
      .circle-icon,
      .shortcut-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 1px solid currentColor;
        border-radius: 999px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .field-icon {
        width: 22px;
        height: 22px;
      }

      .circle-icon {
        width: 42px;
        height: 42px;
        color: var(--accent);
        background: var(--surface-strong);
      }

      .shortcut-icon {
        width: 18px;
        height: 18px;
        border-radius: 6px;
        font-size: 10px;
      }

      .field-placeholder {
        flex: 1;
        font-size: 16px;
        line-height: 1.3;
        color: var(--muted);
        opacity: 0.65;
      }

      .button {
        min-height: 56px;
        border-radius: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        padding: 0 18px;
        font-size: 14px;
        font-weight: 700;
        letter-spacing: 0.16em;
        text-transform: uppercase;
      }

      .button.primary {
        background: var(--accent);
        color: #ffffff;
        border: 1px solid transparent;
      }

      .button.secondary {
        background: var(--input);
        color: var(--fg);
        border: 1px solid var(--border);
      }

      .button.ghost {
        background: transparent;
        color: var(--accent);
        border: 1px solid var(--border);
      }

      .button.full {
        width: 100%;
      }

      .divider {
        height: 1px;
        background: var(--hairline);
      }

      .checkbox-row {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .checkbox {
        width: 22px;
        height: 22px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--surface-strong);
        color: var(--success);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        font-weight: 700;
      }

      .pill-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 32px;
        padding: 0 12px;
        border-radius: 999px;
        border: 1px solid var(--border);
        background: var(--surface);
        font-size: 12px;
        font-weight: 700;
        color: var(--muted);
      }

      .pill.active,
      .pill.accent {
        color: var(--accent);
        background: var(--accent-soft);
        border-color: rgba(176, 106, 56, 0.3);
      }

      .pill.success {
        color: var(--success);
        background: var(--success-soft);
        border-color: transparent;
      }

      .pill.warning {
        color: var(--warning);
        background: var(--warning-soft);
        border-color: transparent;
      }

      .list-card {
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--surface);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .list-card-inner {
        display: flex;
        gap: 0;
      }

      .list-card-bar {
        width: 4px;
        background: var(--accent);
      }

      .list-card-bar.success {
        background: var(--success);
      }

      .list-card-body {
        flex: 1;
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .place-title {
        margin: 0;
        font-size: 24px;
        line-height: 1.1;
        font-weight: 700;
      }

      .place-title.compact {
        font-size: 20px;
      }

      .place-subtitle {
        margin: 0;
        font-size: 17px;
        line-height: 1.35;
        color: var(--muted);
      }

      .mini-detail {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 15px;
        color: var(--muted);
      }

      .mini-dot {
        width: 16px;
        height: 16px;
        border-radius: 999px;
        border: 1px solid currentColor;
        opacity: 0.6;
      }

      .score-box {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--input);
        min-height: 92px;
        padding: 14px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .progress {
        height: 6px;
        border-radius: 999px;
        background: var(--hairline);
        overflow: hidden;
      }

      .progress > span {
        display: block;
        height: 100%;
        border-radius: 999px;
        background: var(--accent);
      }

      .shortcut-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
      }

      .shortcut {
        min-height: 52px;
        border-radius: 18px;
        border: 1px solid var(--border);
        background: var(--surface);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
      }

      .shortcut.active {
        background: var(--accent);
        color: #ffffff;
        border-color: transparent;
      }

      .option-stack {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .option-card {
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--input);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .option-card strong {
        font-size: 16px;
        line-height: 1.35;
      }

      .question-card {
        border: 1px solid var(--border);
        border-radius: 22px;
        background: var(--surface);
        padding: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        box-shadow: var(--shadow);
      }

      .question-options {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
      }

      .question-option {
        min-height: 44px;
        border: 1px solid var(--border);
        border-radius: 16px;
        background: var(--input);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
        text-align: center;
        font-size: 13px;
        font-weight: 600;
        color: var(--secondary);
      }

      .question-option.active {
        color: var(--accent);
        background: var(--accent-soft);
        border-color: rgba(176, 106, 56, 0.3);
      }

      .settings-card {
        border: 1px solid var(--border);
        border-radius: 24px;
        background: var(--surface);
        padding: 18px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        box-shadow: var(--shadow);
      }

      .settings-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--hairline);
      }

      .settings-row:last-child {
        border-bottom: 0;
      }

      .theme-toggle {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .theme-option {
        min-height: 74px;
        border: 1px solid var(--border);
        border-radius: 18px;
        background: var(--input);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      .theme-option.active {
        color: var(--accent);
        background: var(--accent-soft);
        border-color: rgba(176, 106, 56, 0.3);
      }

      .tab-bar {
        margin-top: auto;
        border-top: 1px solid var(--hairline);
        background: color-mix(in srgb, var(--bg) 92%, var(--surface) 8%);
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 6px;
        padding: 8px 8px 10px;
      }

      .tab-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-align: center;
        color: var(--muted);
      }

      .tab-glyph {
        width: 16px;
        height: 16px;
        border-radius: 5px;
        border: 1.5px solid currentColor;
      }

      .tab-item.active {
        color: var(--accent);
      }

      .tab-item span {
        font-family: "JetBrains Mono", monospace;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .home-indicator {
        width: 132px;
        height: 5px;
        border-radius: 999px;
        background: var(--home-indicator);
        opacity: 0.88;
        margin: 0 auto 10px;
      }

      .spacer-large {
        flex: 1;
      }

      .preparing-card {
        margin-top: 280px;
      }

      @media (max-width: 1460px) {
        .screen-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="page" id="page"></main>
    <script>
      const modeParam = new URLSearchParams(globalThis.location.search).get("mode");
      const mode = modeParam === "dark" ? "dark" : "light";
      document.body.classList.add(mode === "dark" ? "mode-dark" : "mode-light");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll("\"", "&quot;")
          .replaceAll("'", "&#39;");
      }

      function statusBar(timeLabel) {
        return `
          <div class="status-bar">
            <div class="status-time">${escapeHtml(timeLabel)}</div>
            <div class="dynamic-island"></div>
            <div class="status-cluster">
              <div class="signal"><span></span><span></span><span></span><span></span></div>
              <div class="wifi"></div>
              <div class="battery"><div class="battery-level"></div></div>
            </div>
          </div>
        `;
      }

      function appBar(title, options = {}) {
        const back = options.back === true ? "<div class=\"back-glyph\">&lt;</div>" : "<div></div>";
        const trailing = options.trailing === true ? "<div class=\"trailing-glyph\">...</div>" : "<div></div>";
        const centerClass = options.centerTitle === true ? " center-title" : "";
        return `
          <div class="app-bar${centerClass}">
            ${back}
            <div class="app-bar-title">${escapeHtml(title)}</div>
            ${trailing}
          </div>
        `;
      }

      function tabBar(activeLabel) {
        const labels = ["Home", "Places", "Execute", "Reports", "Settings"];
        return `
          <div class="tab-bar">
            ${labels
              .map((label) => {
                const active = label === activeLabel ? " active" : "";
                return `
                  <div class="tab-item${active}">
                    <div class="tab-glyph"></div>
                    <span>${escapeHtml(label)}</span>
                  </div>
                `;
              })
              .join("")}
          </div>
        `;
      }

      function titleBlock(title, subtitle, center = false, kicker = "") {
        return `
          <div class="title-block${center ? " center" : ""}">
            ${kicker.length > 0 ? `<div class="kicker">${escapeHtml(kicker)}</div>` : ""}
            <h2>${escapeHtml(title)}</h2>
            ${subtitle.length > 0 ? `<p>${escapeHtml(subtitle)}</p>` : ""}
          </div>
        `;
      }

      function button(label, variant = "primary", full = true) {
